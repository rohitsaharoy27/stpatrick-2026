<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clover Flight Invite</title>
    <link rel="stylesheet" href="styles.css?v=20260227b" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <div class="hud-item">🪽 Passed <span id="passedCount">0</span></div>
        <div class="hud-item">🔓 Left <span id="remainingCount">0</span></div>
        <div class="hud-item">🌟 Best <span id="bestCount">0</span></div>
      </header>

      <section class="address-panel" aria-live="polite">
        <h1>Flap past rainbow trails and pot-of-gold hazards. Each pass unlocks one letter.</h1>
        <p id="addressMasked" class="address-masked"></p>
      </section>

      <section class="game-wrap">
        <canvas id="game" width="360" height="640" aria-label="Clover flappy game"></canvas>
        <p class="help">Tap anywhere to flap. Keyboard: Space or ↑. Turn sound on for the festive loop.</p>
      </section>

      <div id="overlay" class="overlay hidden">
        <div class="overlay-card">
          <div id="tequilaRain" class="tequila-rain" aria-hidden="true"></div>
          <h2 id="overlayTitle"></h2>
          <div id="winArt" class="win-art hidden" aria-hidden="true">🍯🌈🍀</div>
          <p id="overlayText"></p>
          <button id="restartButton">Play Again</button>
        </div>
      </div>
    </main>

    <script src="game.js?v=20260227b"></script>
  </body>
</html>
